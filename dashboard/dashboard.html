<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title></title>
        <link rel="stylesheet" href="dashboard.css">
        <link rel="stylesheet" href="https://www.nerdfonts.com/assets/css/webfont.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playwrite+NZ+Basic:wght@100..400&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <nav class="tabs-menu">
            <div class="tab-btn active tab" data-target="view-data">
                <i class="nav-icon nf nf-fa-message"></i>
                <span class="nav-item">Mensajes</span>
            </div>
            <div class="tab-btn tab" data-target="view-addClassRooms">
                <i class="nav-icon nf nf-cod-add"></i>
                <span class="nav-item">Agregar</span>
            </div>
            <div class="tab-btn tab" data-target="view-classRooms">
                <i class="nav-icon nf nf-md-google_classroom"></i>
                <span class="nav-item">Aulas</span>
            </div>
            <div class="tab-btn tab" data-target="view-silent">
                <i class="nav-iconv nf nf-fa-bell_slash"></i>
                <span class="nav-item">Bloqueados</span>
            </div>
            <div class="tab-btn tab" data-target="view-settings">
                <i class="nav-icon nf nf-cod-settings"></i>
                <span class="nav-item">Ajustes</span>
            </div>
        </nav>
        <main class="scrollable-content">
            <!-- Foros silenciados -->
            <section id="view-silent" class="tab-content" style="display: none;">
                <div class="section-container">
                    <h1 class="title-section">Foros Silenciados</h1>
                    <div id="silent-classRooms-Data"></div>
                </div>
            </section>

            <!-- Aulas guardas -->
            <section id="view-classRooms" class="tab-content" style="display: none;">
                <div class="section-container">
                <h1 class="title-section">Aulas</h1>
                <div id="classRooms-Data"></div>
                </div>
            </section>
            <!-- Configuración -->
            <section id="view-settings" class="tab-content" style="display: none;">
                <div class="section-container">
                    <h1 class="title-section">Configuración</h1>
                    <div id="alert-setting" class="alert-container" style="display:none;"></div>
                    <div class="form-container">
                        <form class="form" id="form_setting">
                            <div class="form-content">
                                <label for="url">URL Base <span class="optional form-default-label">Default: https://frgp.cvg.utn.edu.ar</span></label>
                                <input name="domain" id="url" placeholder="https://moodle.ejemplo.com" />
                            </div>

                            <div class="form-content">
                                <label for="interval">Intervalo (minutos)</label>
                                <input name="timeInterval" id="interval" type="number" placeholder="15" />
                            </div>

                            <button type="submit" class="btn bg-submit">Guardar</button>
                        </form>
                    </div>
            </section>
            <!-- Agregar Aulas -->
            <section id="view-addClassRooms" class="tab-content" style="display: none;">
                <div class="section-container">
                    <h1 class="title-section">Agregar aula</h1>
                    <div id="alert-classroom" class="alert-container" style="display:none;"></div>
                    <div class="form-container">
                        <form class="form" id="form-classroom">
                            <div class="form-content">
                                <label for="classRoomName">Nombre <span class="required form-default-label">Requerido</span></label>
                                <input name="name" id="classRoomName" placeholder="Ej: Programación III" required />
                            </div>

                            <div class="form-content">
                                <label for="classRoomCode">Código del aula <span class="required form-default-label">Requerido</span></label>
                                <input name="code" id="classRoomCode" placeholder="Ej: 6589" required />
                            </div>

                            <div class="form-content">
                                <label for="classRoomSection">Sección <span class="optional form-default-label">Default: 0</span></label>
                                <input name="section" id="classRoomSection" placeholder="Ej: 0" />
                            </div>

                            <div class="form-content">
                                <label for="url">URL Base <span class="optional form-default-label">Default: URL Base</span></label>
                                <input name="domain" id="url" placeholder="https://moodle.utn.edu.ar" />
                            </div>

                            <button type="submit" id="btn_classRoom" class="btn bg-submit">
                                Agregar
                            </button>
                        </form>
                    </div>
                </div>
            </section>
            <!-- Principal -->
            <section id="view-data" class="tab-content">
                <div class="section-container">
                    <h1 class="title-section">Mensajes</h1>
                    <div id="alert-main" class="alert-container" style="display:none;">
                    </div>
                    <div id="moodle-data"></div>
                </div>
            </section>
        </main>
        <div class="section-header">
            <div id="check-now-btn" class="btn btn-check">Revisar ahora</div>
            <div id="intervaleTime" class="intervale-time">
                <i class="icon nf nf-fa-clock"></i>
                <p>Frecuencia: <span class="intervale-time-data" id="intervaleTimeMinutes"></span></p>
            </div>
        </div>

        <script src="dashboard.js"></script>
    </body>
</html>
